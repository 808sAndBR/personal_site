<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#F9C41A"/>
  <!-- rear wheel -->
  <circle cx="8.5" cy="22" r="5.5" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
  <!-- front wheel -->
  <circle cx="23.5" cy="22" r="5.5" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
  <!-- chainstay: BB to rear axle -->
  <line x1="15" y1="18" x2="8.5" y2="22" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- seat tube -->
  <line x1="13.5" y1="11.5" x2="15" y2="18" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- down tube: head tube to BB -->
  <line x1="19.5" y1="12.5" x2="15" y2="18" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- top tube -->
  <line x1="13.5" y1="11.5" x2="19.5" y2="12.5" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- fork: head tube to front axle -->
  <line x1="19.5" y1="12.5" x2="23.5" y2="22" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- saddle -->
  <line x1="11" y1="11" x2="15.5" y2="11" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- handlebar -->
  <line x1="19" y1="11.5" x2="22.5" y2="10.5" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
</svg>
