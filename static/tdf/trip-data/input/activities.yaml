trip-jul-08:
  - id: "trip-jul-08-col-daspin-ride"
    type: ride
    name: Bike Ride
    overview: |
      Road closures, leg feels, and weather will play into what makes sense.
      If we feel wound up can go for Tourmalet.
      If weather or logistics are fighting us, Col d’Aspin seems great and could jam it in between weather pattens or before it gets too hot.
      Monster loop that is beyond unhinged: https://ridewithgps.com/routes/49478783 56 mi 9.5k

      Tourmalet Ride:
        If stars aligning, this is a cool option. Would need to drive to the start of the ride.
        Potential to start at a few different points depending on conditions.
        Campan:
          Seems like most reasonable approach without adding Col d’Aspin to the mix lol
          40 min drive
          route: https://ridewithgps.com/routes/51696870
          28.6 mi 4.8k elevation (route above is climb only so doubled length)
        Payolle-Campan:
          possibly parking would be easier if trouble at Campan
          30 min drive
          route: https://ridewithgps.com/routes/42191482
          29.7 mi 5.1k elevation
        Artigues:
          Looks like more of a pull off than a real town we should expect parking at.
          Potentailly worth rolling the dice if only a small weather window or potentially if were too cooked for full climb but want to do super early.
          1hr 15 min drive
          6.7 miles 3k elevation

      Col d’Aspin Ride:
        Can climb from Arreau lodging
        Doing part of this to watch the riders the next day is a top pick viewing area.
        15.8 mi 2.7k elevation
        route: https://ridewithgps.com/routes/44399253

      Hautacam Ride:
        Likely would want to drive to Argelès-Gazost to start the ride. ~1 hour.
        18.5 mi 3.8k elevation
        route: https://ridewithgps.com/routes/6444192

    summary: Potential local climb from the Arreau base if conditions and energy are good.
    status: "needs-details"
    startTime: Flexible

